# ─────────────────────────────────────────────────────────────────────────────
# AssetVault — Multi-platform production release pipeline
#
# Trigger: push a semver tag  git tag v1.2.3 && git push origin v1.2.3
#
# What this does:
#   1. Creates a draft GitHub release.
#   2. In parallel, builds for Windows x64 and macOS Universal.
#   3. Each build: compiles Python sidecar (PyInstaller --onedir),
#      then runs `tauri build` and uploads artifacts to the draft release.
#
# Required GitHub secrets
# ────────────────────────
#   TAURI_SIGNING_PRIVATE_KEY          — ed25519 private key (scripts/keygen.sh)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the key above
#
# Optional secrets for Windows code-signing
#   WINDOWS_CERTIFICATE                — base64-encoded .pfx certificate
#   WINDOWS_CERTIFICATE_PASSWORD       — .pfx password
#
# Optional secrets for macOS code-signing + notarization
#   (Without these the app will show "damaged" on macOS Gatekeeper)
#   APPLE_CERTIFICATE          — base64-encoded .p12 Developer ID Application cert
#                                 openssl base64 -in cert.p12 | tr -d '\n'
#   APPLE_CERTIFICATE_PASSWORD — password used when exporting the .p12
#   APPLE_SIGNING_IDENTITY     — e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                   — your Apple ID email (for notarytool)
#   APPLE_PASSWORD             — app-specific password (appleid.apple.com → Security)
#   APPLE_TEAM_ID              — 10-char team ID from developer.apple.com
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Step 1: Create the draft GitHub release (fast — no build required)
  # ───────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "name=AssetVault v$VERSION" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## What's Changed
            See [CHANGELOG.md](https://github.com/janglee83/manage-asset-app/blob/main/CHANGELOG.md)
            for full release notes.

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS Apple Silicon (M1+) | `AssetVault_*_aarch64.dmg` |
            | macOS Intel x64 | `AssetVault_*_x64.dmg` |
            | Windows x64 | `AssetVault_*_x64-setup.exe` |
          draft: true
          prerelease: false

  # ───────────────────────────────────────────────────────────────────────────
  # Step 2a: Windows x64
  # ───────────────────────────────────────────────────────────────────────────
  release-windows:
    name: Build Windows x64
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('python-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python sidecar
        shell: pwsh
        run: ./scripts/build-sidecar.ps1

      - name: Decode code-signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        id: write-cert
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "cert-path=$certPath" >> $env:GITHUB_OUTPUT

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_WINDOWS_PFX_FILE: ${{ steps.write-cert.outputs.cert-path || '' }}
          TAURI_WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.release.conf.json

      - name: Remove decoded certificate
        if: always() && steps.write-cert.outputs.cert-path != ''
        shell: pwsh
        run: Remove-Item -Force "${{ steps.write-cert.outputs.cert-path }}" -ErrorAction SilentlyContinue

  # ───────────────────────────────────────────────────────────────────────────
  # Step 2b: macOS Universal (aarch64 + x86_64)
  # ───────────────────────────────────────────────────────────────────────────
  release-macos:
    name: Build macOS Universal
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable) with both macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python sidecar
        run: bash ./scripts/build-sidecar.sh

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build aarch64 (Apple Silicon) and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin --config src-tauri/tauri.release.conf.json

      - name: Build x86_64 (Intel) and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-apple-darwin --config src-tauri/tauri.release.conf.json

      - name: Remove signing keychain
        if: always() && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

  # ───────────────────────────────────────────────────────────────────────────
  # Step 3: Publish the draft release once all platform builds succeed
  # ───────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish release
    needs: [create-release, release-windows, release-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Publish draft → public release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          release_id = os.environ["RELEASE_ID"]
          url = f"https://api.github.com/repos/janglee83/manage-asset-app/releases/{release_id}"
          payload = json.dumps({"draft": False, "make_latest": "true"}).encode()
          req = urllib.request.Request(url, data=payload, method="PATCH")
          req.add_header("Authorization", f"token {token}")
          req.add_header("Accept", "application/vnd.github+json")
          req.add_header("Content-Type", "application/json")
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
          print(f"Published: {data['html_url']}")
          EOF

