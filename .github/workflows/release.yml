# ─────────────────────────────────────────────────────────────────────────────
# AssetVault — Multi-platform production release pipeline
#
# Trigger: push a semver tag  git tag v1.2.3 && git push origin v1.2.3
#
# What this does:
#   1. Creates a draft GitHub release.
#   2. In parallel, builds for Windows x64, macOS Universal, and Linux x64.
#   3. Each build: compiles Python sidecar (PyInstaller --onedir),
#      then runs `tauri build` and uploads artifacts to the draft release.
#
# Required GitHub secrets
# ────────────────────────
#   TAURI_SIGNING_PRIVATE_KEY          — ed25519 private key (scripts/keygen.sh)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the key above
#
# Optional secrets for Windows code-signing
#   WINDOWS_CERTIFICATE                — base64-encoded .pfx certificate
#   WINDOWS_CERTIFICATE_PASSWORD       — .pfx password
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Step 1: Create the draft GitHub release (fast — no build required)
  # ───────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "name=AssetVault v$VERSION" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## What's Changed
            See [CHANGELOG.md](https://github.com/janglee83/manage-asset-app/blob/main/CHANGELOG.md)
            for full release notes.

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS Apple Silicon (M1+) | `AssetVault_*_aarch64.dmg` |
            | macOS Intel x64 | `AssetVault_*_x64.dmg` |
            | Windows x64 | `AssetVault_*_x64-setup.exe` |
            | Linux AppImage | `AssetVault_*_amd64.AppImage` |
            | Linux .deb | `asset-vault_*_amd64.deb` |
          draft: true
          prerelease: false

  # ───────────────────────────────────────────────────────────────────────────
  # Step 2a: Windows x64
  # ───────────────────────────────────────────────────────────────────────────
  release-windows:
    name: Build Windows x64
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('python-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python sidecar
        shell: pwsh
        run: ./scripts/build-sidecar.ps1

      - name: Decode code-signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        id: write-cert
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "cert-path=$certPath" >> $env:GITHUB_OUTPUT

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_WINDOWS_PFX_FILE: ${{ steps.write-cert.outputs.cert-path || '' }}
          TAURI_WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.release.conf.json

      - name: Remove decoded certificate
        if: always() && steps.write-cert.outputs.cert-path != ''
        shell: pwsh
        run: Remove-Item -Force "${{ steps.write-cert.outputs.cert-path }}" -ErrorAction SilentlyContinue

  # ───────────────────────────────────────────────────────────────────────────
  # Step 2b: macOS Universal (aarch64 + x86_64)
  # ───────────────────────────────────────────────────────────────────────────
  release-macos:
    name: Build macOS Universal
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable) with both macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python sidecar
        run: bash ./scripts/build-sidecar.sh

      - name: Build aarch64 (Apple Silicon) and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin --config src-tauri/tauri.release.conf.json

      - name: Build x86_64 (Intel) and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-apple-darwin --config src-tauri/tauri.release.conf.json

  # ───────────────────────────────────────────────────────────────────────────
  # Step 2c: Linux x64 (AppImage + .deb)
  # ───────────────────────────────────────────────────────────────────────────
  release-linux:
    name: Build Linux x64
    needs: create-release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python sidecar
        run: bash ./scripts/build-sidecar.sh

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target x86_64-unknown-linux-gnu --config src-tauri/tauri.release.conf.json


