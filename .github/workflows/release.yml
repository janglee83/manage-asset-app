# ─────────────────────────────────────────────────────────────────────────────
# AssetVault — Windows production release pipeline
#
# Trigger: push a semver tag  git tag v1.2.3 && git push origin v1.2.3
#
# What this does:
#   1. Builds the Python sidecar (PyInstaller --onedir) for Windows.
#   2. Runs `tauri build --target x86_64-pc-windows-msvc`.
#   3. Signs the NSIS installer with the Tauri updater key.
#      Optional: code-signs the binary with a Windows PFX cert.
#   4. Creates a draft GitHub release, uploads the installer + .sig.
#   5. Uploads latest.json (auto-update manifest) to the same release.
#
# Required GitHub secrets
# ────────────────────────
#   TAURI_SIGNING_PRIVATE_KEY          — ed25519 private key (output of scripts/keygen.sh)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the key above
#
# Optional secrets for Windows code-signing (SmartScreen compliance)
#   WINDOWS_CERTIFICATE                — base64-encoded .pfx certificate
#   WINDOWS_CERTIFICATE_PASSWORD       — .pfx password
#
# See scripts/keygen.sh for key generation instructions.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Allow one release to run at a time; cancel any in-progress run for the same
# tag if a new one is triggered (e.g. an amended push).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Windows x64 release build
  # ───────────────────────────────────────────────────────────────────────────
  release-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Frontend dependencies ────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── Python sidecar (PyInstaller) ─────────────────────────────────────
      # Installs the Python service deps and compiles main.py into a
      # self-contained directory (--onedir).  The output is placed at
      # src-tauri/resources/asset-vault-sidecar/ so Tauri bundles it.
      - name: Build Python sidecar
        shell: pwsh
        run: ./scripts/build-sidecar.ps1

      # ── Optional: Windows code-signing ──────────────────────────────────
      # If WINDOWS_CERTIFICATE is set, decode the base64 PFX and configure
      # Tauri/NSIS to sign the binary and installer.
      # Delete or leave empty to skip code-signing (unsigned builds still work,
      # but Windows SmartScreen will show an "Unknown Publisher" warning).
      - name: Decode code-signing certificate
        if: env.WINDOWS_CERTIFICATE != ''
        id: write-cert
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          echo "cert-path=$certPath" >> $env:GITHUB_OUTPUT

      # ── Tauri build + GitHub release ─────────────────────────────────────
      # tauri-apps/tauri-action:
      #   * runs `npm run build` then `cargo tauri build`
      #   * creates a draft GitHub release
      #   * uploads the NSIS installer (.exe), its updater signature (.exe.sig),
      #     and the latest.json update manifest
      - name: Build Tauri app and create GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required for auto-update to verify downloads)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows code-signing (optional)
          TAURI_WINDOWS_PFX_FILE: ${{ steps.write-cert.outputs.cert-path || '' }}
          TAURI_WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AssetVault ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed
            See [CHANGELOG.md](https://github.com/janglee83/manage-asset-app/blob/main/CHANGELOG.md)
            for full release notes.

            ### Installation
            Download `AssetVault_*_x64-setup.exe` below and run it.
            The installer does **not** require administrator rights
            (current-user install mode).
          releaseDraft: true
          prerelease: false
          # Target Windows x64; avoids cross-compiling Rust crates for other
          # platforms on this runner.
          args: --target x86_64-pc-windows-msvc --config tauri.release.conf.json

      # ── Cleanup ──────────────────────────────────────────────────────────
      - name: Remove decoded certificate
        if: always() && steps.write-cert.outputs.cert-path != ''
        shell: pwsh
        run: Remove-Item -Force "${{ steps.write-cert.outputs.cert-path }}" -ErrorAction SilentlyContinue
